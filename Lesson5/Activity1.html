<!DOCTYPE html>

<html>

<head>

    <title>My Animal Fact File</title>
    <style>
        body {

            background-color: red;

            font-family: Arial, sans-serif;

        }

        .fact-file {

            background-color: lightcoral;

            color: darkslategray;

            width: 280px;

            padding: 30px;

            border: 6px solid forestgreen;

            margin: 30px;

        }
        .animal-name {

color: forestgreen;

font-size: 22px;

}
.detail {

color: rebeccapurple;

}
.cool-fact {
color: red;

font-style: bold;

}
.detail2 {
    color:rgb(0, 140, 255);
}


    </style>

</head>

<body>

    <div class="fact-file">

        <h2 class="animal-name">Snow Leopard</h2>

        <p class="detail">Type: Big Cat</p>

        <p class="detail">Lives in: Mountain ranges of Central Asia</p>

        <p class="detail">Diet: Deer, goats, and wild sheep</p>

        <p class="cool-fact">Cool Fact: Can leap up to 15 metres in one jump!</p>

    </div>
    <div class="fact-file">
        <h2>Land Leopard</h2>
        <p class="cool-fact">A Land Cat</p>
    </div>

</body>

</html>
